name: Lex Aureon CI Guard

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python syntax validation
        run: |
          python -m py_compile app/main.py sovereign_kernel_v2.py

      - name: Startup resilience test
        run: |
          python - << 'PY'
          from app.main import app
          assert app is not None
          print("OK: App import safe")
          PY

      - name: Contract schema check
        run: |
          python - << 'PY'
          REQUIRED = {
              "raw_output",
              "governed_output",
              "final_output",
              "intervention",
              "intervention_reason",
              "semantic_diff_score",
              "M"
          }
          print("Contract keys locked:", REQUIRED)
          PY

      - name: Render binding validation
        run: |
          python - << 'PY'
          from pathlib import Path
          import re

          content = Path("render.yaml").read_text(encoding="utf-8")
          if not re.search(r"startCommand:\s*\|[\s\S]*app\.main:app", content):
              print("ERROR: Render start command must include ASGI target 'app.main:app'")
              print("--- render.yaml ---")
              print(content)
              raise SystemExit(1)

          print("Render binding validation passed: found 'app.main:app' in startCommand")
          PY

      - name: Typing Import Guard
        run: python scripts/check_typing_imports.py

      - name: Test suite
        run: |
          pytest -q

      - name: CI Pass
        run: echo "Lex Aureon CI PASSED — deployment allowed"
