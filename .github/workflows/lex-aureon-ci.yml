name: Lex Aureon CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Python tests
        run: pytest -q tests/contracts tests/test_lex_api_routes.py

  contract-schema-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install pydantic==1.10.26
      - name: Validate contracts
        run: python scripts/lex_aureon/validate_contracts.py

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck

  frontend-e2e-optional:
    runs-on: ubuntu-latest
    if: ${{ vars.RUN_PLAYWRIGHT_E2E == 'true' }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Run Playwright / screenshot E2E suite
        run: npm run test:e2e

  security-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Bandit security scan
        run: |
          pip install bandit
          bandit -r app/ lex_aureon/ sovereign_kernel_v2.py -ll --exclude tests,scripts -f txt

  stripe-config-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stripe webhook endpoint present in API gateway
        run: grep -qE "billing/stripe/webhook" lex_aureon/backend/api_gateway/main.py
      - name: STRIPE_WEBHOOK_SECRET referenced in codebase
        run: grep -rqE "STRIPE_WEBHOOK_SECRET" lex_aureon/backend/
