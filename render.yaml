services:
  - type: web
    name: lex-aureon
    env: python
    plan: starter
    buildCommand: |
      pip install -r requirements.txt
    startCommand: |
      uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: ENV
        value: "production"
      - key: LEX_FRONTEND_BASE_URL
        sync: false
      - key: LEX_CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: LEX_AUTH_SECRET
        sync: false
      - key: LEX_AUDIT_KEYS_JSON
        sync: false
      - key: LEX_ACTIVE_AUDIT_KEY_ID
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: AUREONICS_PRODUCTION_LOGGING
        value: "1"
    autoDeploy: true

  - type: web
    name: lex-aureon-frontend
    env: node
    plan: starter
    rootDir: frontend
    buildCommand: |
      npm ci
      npm run build
    startCommand: |
      npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: LEX_API_BASE_URL
        sync: false
      - key: NEXT_PUBLIC_LEX_API_BASE_URL
        sync: false
      - key: SALES_CONTACT_EMAIL
        sync: false
      - key: SALES_PHONE_E164
        sync: false
      - key: MANUAL_INVOICE_TERMS_DAYS
        value: "7"
    autoDeploy: true
