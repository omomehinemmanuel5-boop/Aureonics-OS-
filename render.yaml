services:
  - type: web
    name: lex-aureon
    env: python
    plan: starter
    buildCommand: |
      pip install -r requirements.txt
    startCommand: |
      uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: ENV
        value: "production"
    autoDeploy: true
