<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lex Aureon Trust Layer</title>
  <style>
    body { font-family: Inter, Arial, sans-serif; margin: 0; background: #0f172a; color: #e2e8f0; }
    .wrap { max-width: 920px; margin: 24px auto; padding: 0 16px; }
    .card { background: #111827; border: 1px solid #334155; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    textarea, pre { width: 100%; box-sizing: border-box; border-radius: 8px; border: 1px solid #334155; background: #020617; color: #e2e8f0; padding: 10px; }
    textarea { min-height: 100px; }
    pre { min-height: 74px; white-space: pre-wrap; }
    button { background: #38bdf8; color: #082f49; border: 0; border-radius: 8px; padding: 10px 14px; font-weight: 700; cursor: pointer; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .badge { border-radius: 999px; padding: 4px 10px; border: 1px solid #334155; font-size: 12px; }
    .yes { color: #fca5a5; } .no { color: #86efac; }
    summary { cursor: pointer; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Lex Aureon · Production Console</h1>
    <div class="card">
      <label for="prompt">Prompt input</label>
      <textarea id="prompt" placeholder="Enter a prompt..."></textarea>
      <div class="row" style="margin-top:10px;">
        <button id="runBtn">Run</button>
        <label><input type="checkbox" id="demoMode"/> DEMO_MODE (UI only)</label>
        <span id="badge" class="badge">Intervention: —</span>
      </div>
    </div>

    <div class="card"><strong>Raw Output</strong><pre id="raw"></pre></div>
    <div class="card"><strong>Governed Output</strong><pre id="governed"></pre></div>
    <div class="card"><strong>Final Output</strong><pre id="final"></pre></div>

    <div class="card">
      <details id="explainBox"><summary>Explanation</summary><pre id="explain"></pre></details>
      <div class="row" style="margin-top:10px;">
        <button id="shareBtn">Share card</button>
      </div>
      <pre id="share"></pre>
    </div>
  </div>

<script>
let last = null;

function render(data) {
  document.getElementById('raw').textContent = data.raw_output || '';
  document.getElementById('governed').textContent = data.governed_output || '';
  document.getElementById('final').textContent = data.final_output || '';
  const badge = document.getElementById('badge');
  badge.textContent = `Intervention: ${data.intervention}`;
  badge.className = `badge ${data.intervention ? 'yes' : 'no'}`;

  const demo = document.getElementById('demoMode').checked;
  const explanation = demo
    ? `${data.intervention_reason}\n\nM=${data.M} | semantic_diff_score=${data.semantic_diff_score}`
    : data.intervention_reason;
  document.getElementById('explain').textContent = explanation;
  if (demo) document.getElementById('explainBox').setAttribute('open', 'open');
  last = data;
}

async function run() {
  const prompt = document.getElementById('prompt').value;
  const res = await fetch('/lex/run', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ prompt })
  });
  const data = await res.json();
  render(data);
}

function makeShareCard() {
  if (!last) return;
  const share = {
    prompt: document.getElementById('prompt').value,
    raw_output: last.raw_output,
    final_output: last.final_output,
    intervention: last.intervention,
    intervention_reason: last.intervention_reason,
    M: last.M,
    semantic_diff_score: last.semantic_diff_score
  };
  document.getElementById('share').textContent = JSON.stringify(share, null, 2);
}

document.getElementById('runBtn').addEventListener('click', run);
document.getElementById('shareBtn').addEventListener('click', makeShareCard);
</script>
</body>
</html>
