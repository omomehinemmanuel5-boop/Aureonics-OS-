<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lex Aureon · Trust Layer</title>
  <style>
    body { font-family: Inter, Arial, sans-serif; background:#0c1220; color:#e8eefc; margin:0; }
    .wrap { max-width: 920px; margin: 24px auto; padding: 0 16px; }
    .card { background:#131b2e; border:1px solid #2a3855; border-radius:12px; padding:14px; margin-top:12px; }
    textarea { width:100%; min-height:100px; background:#0f1628; border:1px solid #2a3855; color:#e8eefc; border-radius:8px; padding:10px; }
    button { background:#66b2ff; color:#041327; border:0; border-radius:8px; font-weight:700; padding:10px 14px; cursor:pointer; }
    .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-top:10px; }
    .badge { padding:6px 10px; border-radius:999px; border:1px solid #2a3855; font-size:12px; font-weight:700; }
    .safe { color:#29d27d; } .alert { color:#ff6f6f; }
    .label { color:#9db0cf; font-size:12px; text-transform:uppercase; margin-bottom:6px; }
    .out { background:#0f1628; border:1px solid #2a3855; border-radius:8px; padding:10px; white-space:pre-wrap; min-height:74px; }
    details { margin-top:8px; }
    pre { white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Lex Aureon Trust Layer</h1>
    <div class="card">
      <div class="label">Prompt</div>
      <textarea id="prompt">Explain why governance APIs need stable response contracts.</textarea>
      <div class="row">
        <button onclick="runPrompt()">Run</button>
        <label><input id="demoMode" type="checkbox" /> DEMO_MODE (UI only)</label>
        <span id="interventionBadge" class="badge safe">No intervention</span>
      </div>
    </div>

    <div class="card"><div class="label">Raw Output</div><div id="raw" class="out">—</div></div>
    <div class="card"><div class="label">Governed Output</div><div id="governed" class="out">—</div></div>
    <div class="card"><div class="label">Final Output</div><div id="final" class="out">—</div></div>

    <div class="card">
      <details>
        <summary>Explanation</summary>
        <div id="reason" class="out">—</div>
      </details>
      <div class="row">
        <button onclick="copyShareCard()">Share Card</button>
        <span id="shareStatus"></span>
      </div>
      <pre id="sharePreview" class="out">—</pre>
    </div>
  </div>

<script>
let latest = null;

function stableShareCard(prompt, data) {
  return {
    prompt,
    raw_output: data.raw_output || "",
    final_output: data.final_output || "",
    intervention: Boolean(data.intervention),
    intervention_reason: data.intervention_reason || "",
    M: Number(data.M || 0),
    semantic_diff_score: Number(data.semantic_diff_score || 0),
  };
}

function render(data) {
  const demo = document.getElementById('demoMode').checked;
  document.getElementById('raw').textContent = data.raw_output || '';
  document.getElementById('governed').textContent = data.governed_output || '';
  document.getElementById('final').textContent = data.final_output || '';

  const badge = document.getElementById('interventionBadge');
  badge.textContent = data.intervention ? 'Intervention active' : 'No intervention';
  badge.className = `badge ${data.intervention ? 'alert' : 'safe'}`;

  const reason = data.intervention_reason || '';
  const mLine = `M=${Number(data.M || 0).toFixed(6)} · semantic_diff_score=${Number(data.semantic_diff_score || 0).toFixed(6)}`;
  document.getElementById('reason').textContent = demo ? `${reason}\n\n${mLine}` : reason;

  const prompt = document.getElementById('prompt').value;
  latest = stableShareCard(prompt, data);
  document.getElementById('sharePreview').textContent = JSON.stringify(latest, null, 2);
}

async function runPrompt() {
  const prompt = document.getElementById('prompt').value;
  const response = await fetch('/lex/run', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt })
  });
  const data = await response.json();
  render(data);
}

async function copyShareCard() {
  if (!latest) return;
  await navigator.clipboard.writeText(JSON.stringify(latest, null, 2));
  document.getElementById('shareStatus').textContent = 'Copied';
}
</script>
</body>
</html>
