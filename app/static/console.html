<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lex Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/firewall.css" />
</head>
<body>
  <main class="dashboard-shell">
    <header class="dash-header">
      <a href="/" class="text-link">← Back to landing</a>
      <h1>Lex Dashboard</h1>
      <label class="dev-toggle"><input type="checkbox" id="devMode" /> Developer mode</label>
    </header>

    <section class="dashboard-grid">
      <aside class="panel">
        <h2>Input</h2>
        <textarea id="promptInput" placeholder="Paste a prompt to run governed inference..."></textarea>
        <button id="runBtn" class="primary-btn">Run</button>
      </aside>

      <section class="panel">
        <h2>Final Output</h2>
        <div id="finalOutput" class="output-box">No result yet.</div>
        <div class="share-row">
          <button id="copyBtn" class="ghost-btn">Copy Output</button>
          <button id="shareBtn" class="ghost-btn">Create Share Card</button>
        </div>
        <div id="shareCard" class="share-card hidden"></div>
        <div id="developerTrace" class="developer-trace hidden"></div>
      </section>

      <aside class="panel metric-panel">
        <h2>Governance Score</h2>
        <p><span>M</span><strong id="mValue">—</strong></p>
        <p><span>Intervention</span><strong id="interventionBadge" class="badge pass">PASS</strong></p>
        <p><span>Plan</span><strong id="planValue">free</strong></p>
        <p><span>Remaining</span><strong id="remainingValue">—</strong></p>
      </aside>
    </section>
  </main>

  <script src="/static/firewall.js" defer></script>
</body>
</html>
